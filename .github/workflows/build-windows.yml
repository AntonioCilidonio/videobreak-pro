name: Build Windows EXE (VideoBreakPro v4)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ✅ comando su UNA riga (compatibile PowerShell)
      - name: Build EXE with PyInstaller
        run: pyinstaller --noconfirm --clean --onefile --windowed --name VideoBreakPro src\videobreak_pro.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoBreakPro_EXE
          path: dist/VideoBreakPro.exe
